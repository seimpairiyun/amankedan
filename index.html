<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservasi · Mobil & Ruang Rapat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">RR</div>
      <div class="brand-text">
        <strong>Reservasi</strong>
        <span>Mobil &amp; Ruang Rapat</span>
      </div>
    </div>

    <button class="btn-primary btn-new" id="btnNewBooking">
      <span class="plus">+</span> Ajukan Peminjaman
    </button>

    <div class="sidebar-section">
      <h3>Jenis Resource</h3>
      <label class="check-row">
        <input type="checkbox" class="filter-type" value="mobil" checked>
        <span class="check-box"></span>
        <span class="dot dot-mobil"></span>
        Mobil Dinas
      </label>
      <label class="check-row">
        <input type="checkbox" class="filter-type" value="ruangan" checked>
        <span class="check-box"></span>
        <span class="dot dot-ruangan"></span>
        Ruang Rapat
      </label>
    </div>

    <div class="sidebar-section">
      <h3>Unit Tersedia</h3>
      <div class="resource-list" id="resourceList"><!-- filled by JS --></div>
    </div>

    <div class="sidebar-section">
      <h3>Status</h3>
      <div class="legend-row"><span class="legend-swatch swatch-approved"></span> Disetujui</div>
      <div class="legend-row"><span class="legend-swatch swatch-pending"></span> Menunggu</div>
      <div class="legend-row"><span class="legend-swatch swatch-rejected"></span> Ditolak</div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <header class="topbar">
      <div class="topbar-left">
        <h1 id="monthLabel">Juni 2026</h1>
        <span class="subtle">Jadwal pemakaian seluruh unit</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="prevMonth" aria-label="Bulan sebelumnya">&larr;</button>
        <button class="btn-today" id="todayBtn">Hari ini</button>
        <button class="icon-btn" id="nextMonth" aria-label="Bulan berikutnya">&rarr;</button>
      </div>
    </header>

    <div class="calendar-wrap">
      <div class="weekday-row">
        <span>Sen</span><span>Sel</span><span>Rab</span><span>Kam</span><span>Jum</span><span class="weekend">Sab</span><span class="weekend">Min</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"><!-- filled by JS --></div>
    </div>

  </main>
</div>

<!-- ===== DAY DETAIL DRAWER ===== -->
<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <span class="subtle">Jadwal pada</span>
        <h2 id="drawerDate">22 Juni 2026</h2>
      </div>
      <button class="icon-btn" id="closeDrawer" aria-label="Tutup">&times;</button>
    </div>
    <div class="drawer-body" id="drawerBody"><!-- filled by JS --></div>
    <button class="btn-primary btn-block" id="drawerNewBooking">+ Ajukan untuk tanggal ini</button>
  </div>
</div>

<!-- ===== NEW BOOKING MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Form Peminjaman</h2>
      <button class="icon-btn" id="closeModal" aria-label="Tutup">&times;</button>
    </div>

    <form id="bookingForm" class="modal-body">

      <div class="field">
        <label>Jenis Resource</label>
        <div class="segmented" id="typeSegmented">
          <button type="button" class="seg-btn active" data-type="mobil">🚗 Mobil Dinas</button>
          <button type="button" class="seg-btn" data-type="ruangan">🏛 Ruang Rapat</button>
        </div>
      </div>

      <div class="field">
        <label for="resourceSelect">Pilih Unit</label>
        <select id="resourceSelect" required></select>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="dateInput">Tanggal</label>
          <input type="date" id="dateInput" required>
        </div>
        <div class="field">
          <label for="startTime">Jam Mulai</label>
          <input type="time" id="startTime" value="09:00" required>
        </div>
        <div class="field">
          <label for="endTime">Jam Selesai</label>
          <input type="time" id="endTime" value="11:00" required>
        </div>
      </div>

      <div class="field">
        <label for="purposeInput">Keperluan</label>
        <input type="text" id="purposeInput" placeholder="Contoh: Kunjungan klien ke Cikarang" required>
      </div>

      <div class="field">
        <label for="nameInput">Nama Pemohon</label>
        <input type="text" id="nameInput" placeholder="Nama lengkap" required>
      </div>

      <div class="availability-note" id="availabilityNote"></div>

      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="cancelModal">Batal</button>
        <button type="submit" class="btn-primary">Ajukan Peminjaman</button>
      </div>
    </form>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
